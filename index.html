<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>结算系统</title>
  <meta name="theme-color" content="#0f766e" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #f0f4f8;
      --text: #111827;
      --muted: #667085;
      --line: #d8dee8;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --blue: #1d4ed8;
      --gold: #b7791f;
      --red: #b42318;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(15, 118, 110, 0.08), transparent 280px),
        var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 60px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(15, 118, 110, 0.22);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.18;
    }

    .period {
      margin-top: 5px;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .icon-button:hover {
      transform: translateY(-1px);
      border-color: var(--brand);
      background: #f8fffd;
    }

    .icon-button svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 390px) 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .input-panel {
      padding: 20px;
      position: sticky;
      top: 18px;
    }

    .panel-title {
      margin: 0 0 18px;
      font-size: 18px;
      line-height: 1.25;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .input-wrap:focus-within {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.13);
    }

    .input-prefix {
      padding-left: 14px;
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      padding: 13px 14px;
      color: var(--text);
    }

    input[type="date"] {
      min-height: 46px;
    }

    .primary-button {
      width: 100%;
      min-height: 46px;
      margin-top: 4px;
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease;
    }

    .primary-button:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }

    .rule-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .rule-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .rule-value {
      color: var(--text);
      font-weight: 800;
      white-space: nowrap;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .metric {
      min-height: 118px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      display: grid;
      align-content: space-between;
      gap: 12px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .metric-value {
      font-size: 26px;
      line-height: 1.1;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .metric.expense .metric-value {
      color: var(--red);
    }

    .metric.net .metric-value {
      color: var(--brand-dark);
    }

    .metric.month .metric-value {
      color: var(--blue);
    }

    .tables {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .table-panel {
      overflow: hidden;
    }

    .table-header {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
    }

    .table-header h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
    }

    .table-header span {
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      background: #fbfcfe;
      font-size: 13px;
    }

    td:nth-child(2),
    td:nth-child(3),
    th:nth-child(2),
    th:nth-child(3) {
      text-align: right;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .total-row td {
      font-weight: 900;
      background: #fbfcfe;
    }

    .report-panel {
      margin-top: 20px;
      overflow: hidden;
    }

    .report-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .report-head h2 {
      margin: 0;
      font-size: 17px;
    }

    .copy-state {
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 800;
      min-width: 72px;
      text-align: right;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      resize: vertical;
      display: block;
      border: 0;
      outline: 0;
      padding: 18px;
      background: #fff;
      color: var(--text);
      line-height: 1.68;
      font-size: 15px;
    }

    .hidden-download {
      display: none;
    }

    @media (max-width: 920px) {
      .layout,
      .tables {
        grid-template-columns: 1fr;
      }

      .input-panel {
        position: static;
      }
    }

    @media (max-width: 680px) {
      .app-shell {
        width: min(100% - 20px, 1180px);
        padding-top: 14px;
        padding-bottom: 94px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 14px;
      }

      .toolbar {
        width: auto;
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: calc(12px + env(safe-area-inset-bottom));
        z-index: 20;
        justify-content: center;
        padding: 10px;
        border: 1px solid rgba(216, 222, 232, 0.92);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 14px 34px rgba(15, 23, 42, 0.18);
        backdrop-filter: blur(10px);
      }

      .icon-button {
        width: 54px;
        height: 48px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      h1 {
        font-size: 23px;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
      }

      .metric-value {
        font-size: 24px;
      }

      th,
      td {
        padding: 12px 10px;
        font-size: 13px;
      }

      .table-header,
      .report-head {
        padding: 14px 12px;
      }
    }

    @media (max-width: 480px) {
      body {
        background: #f7f8fa;
      }

      .app-shell {
        width: 100%;
        padding-left: 10px;
        padding-right: 10px;
      }

      .period {
        min-height: 18px;
        font-size: 13px;
      }

      .layout {
        gap: 12px;
      }

      .panel {
        border-left: 0;
        border-right: 0;
        border-radius: 0;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      }

      .input-panel {
        padding: 16px 14px;
      }

      .panel-title {
        margin-bottom: 14px;
        font-size: 17px;
      }

      .field {
        margin-bottom: 12px;
      }

      label {
        font-size: 13px;
      }

      .input-wrap {
        min-height: 50px;
        border-radius: 8px;
      }

      input {
        min-height: 50px;
        padding: 13px 12px;
        font-size: 16px;
      }

      input[type="date"],
      input[type="month"] {
        min-height: 50px;
      }

      .primary-button {
        min-height: 48px;
        font-size: 16px;
      }

      .rule-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 14px;
        margin-top: 16px;
        padding-top: 14px;
      }

      .rule-row {
        align-items: flex-start;
        flex-direction: column;
        gap: 2px;
      }

      .metric {
        min-height: 78px;
        padding: 13px 14px;
        gap: 8px;
      }

      .metric-label {
        font-size: 13px;
      }

      .metric-value {
        min-height: 27px;
        font-size: 22px;
      }

      .tables {
        gap: 12px;
      }

      .table-header {
        min-height: 50px;
      }

      table,
      tbody,
      tr,
      td {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        padding: 10px 14px;
        border-bottom: 1px solid var(--line);
      }

      tr:last-child {
        border-bottom: 0;
      }

      td {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 30px;
        padding: 0;
        border-bottom: 0;
        font-size: 14px;
      }

      td:nth-child(2),
      td:nth-child(3) {
        text-align: right;
      }

      td:nth-child(2)::before {
        content: "比例";
        color: var(--muted);
        font-weight: 700;
      }

      td:nth-child(3)::before {
        content: "金额";
        color: var(--muted);
        font-weight: 700;
      }

      td:nth-child(1) {
        font-weight: 800;
      }

      .total-row td {
        background: transparent;
      }

      .report-panel {
        margin-top: 12px;
      }

      textarea {
        min-height: 260px;
        padding: 14px;
        font-size: 14px;
        line-height: 1.62;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .app-shell {
        width: 100%;
        padding: 0;
      }

      .input-panel,
      .toolbar,
      .report-head .icon-button,
      .copy-state {
        display: none;
      }

      .layout,
      .tables,
      .summary-grid {
        display: block;
      }

      .panel,
      .metric {
        box-shadow: none;
        break-inside: avoid;
        margin-bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">U</div>
        <div>
          <h1>结算系统</h1>
          <div class="period" id="periodText"></div>
        </div>
      </div>
      <div class="toolbar" aria-label="操作">
        <button class="icon-button" id="copyBtn" type="button" title="复制报告" aria-label="复制报告">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
        <button class="icon-button" id="downloadBtn" type="button" title="导出 CSV" aria-label="导出 CSV">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path></svg>
        </button>
        <button class="icon-button" id="printBtn" type="button" title="打印" aria-label="打印">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><path d="M6 14h12v8H6z"></path></svg>
        </button>
      </div>
    </header>

    <section class="layout">
      <aside class="panel input-panel">
        <h2 class="panel-title">结算录入</h2>
        <div class="field">
          <label for="settlementMonth">结算月份</label>
          <div class="input-wrap">
            <input id="settlementMonth" type="month" />
          </div>
        </div>
        <div class="field">
          <label for="settlementDate">结算时间</label>
          <div class="input-wrap">
            <input id="settlementDate" type="date" />
          </div>
        </div>
        <div class="field">
          <label for="grossAmount">结算总额</label>
          <div class="input-wrap">
            <span class="input-prefix">U</span>
            <input id="grossAmount" inputmode="decimal" autocomplete="off" />
          </div>
        </div>
        <button class="primary-button" type="button" id="sampleBtn">清空数据</button>
        <div class="rule-list" aria-label="结算比例">
          <div class="rule-row"><span>运营团队</span><span class="rule-value">5%</span></div>
          <div class="rule-row"><span>市场团队</span><span class="rule-value">10%</span></div>
          <div class="rule-row"><span>KK</span><span class="rule-value">25%</span></div>
          <div class="rule-row"><span>K</span><span class="rule-value">7%</span></div>
          <div class="rule-row"><span>T/A</span><span class="rule-value">34%</span></div>
        </div>
      </aside>

      <section>
        <div class="summary-grid">
          <article class="metric month">
            <div class="metric-label">结算月份</div>
            <div class="metric-value" id="monthValue"></div>
          </article>
          <article class="metric expense">
            <div class="metric-label">合计支出</div>
            <div class="metric-value" id="expenseValue"></div>
          </article>
          <article class="metric net">
            <div class="metric-label">净额</div>
            <div class="metric-value" id="netValue"></div>
          </article>
        </div>

        <div class="tables">
          <section class="panel table-panel">
            <div class="table-header">
              <h2>团队支出</h2>
              <span id="expenseRateText">15%</span>
            </div>
            <table>
              <thead>
                <tr>
                  <th>对象</th>
                  <th>比例</th>
                  <th>金额</th>
                </tr>
              </thead>
              <tbody id="teamRows"></tbody>
            </table>
          </section>

          <section class="panel table-panel">
            <div class="table-header">
              <h2>股东分配</h2>
              <span>按净额</span>
            </div>
            <table>
              <thead>
                <tr>
                  <th>股东</th>
                  <th>比例</th>
                  <th>金额</th>
                </tr>
              </thead>
              <tbody id="shareRows"></tbody>
            </table>
          </section>
        </div>

        <section class="panel report-panel">
          <div class="report-head">
            <h2>结算明细</h2>
            <span class="copy-state" id="copyState"></span>
          </div>
          <textarea id="reportText" readonly></textarea>
        </section>
      </section>
    </section>
    <a class="hidden-download" id="downloadLink"></a>
  </main>

  <script>
    const CONFIG = {
      unit: "U",
      teams: [
        { name: "运营团队", rate: 0.05 },
        { name: "市场团队", rate: 0.10 }
      ],
      shareholders: [
        { name: "KK", rate: 0.25 },
        { name: "K", rate: 0.07 },
        { name: "T/A", rate: 0.34, count: 2 }
      ],
      rounding: Math.floor
    };

    const els = {
      settlementMonth: document.querySelector("#settlementMonth"),
      date: document.querySelector("#settlementDate"),
      gross: document.querySelector("#grossAmount"),
      period: document.querySelector("#periodText"),
      month: document.querySelector("#monthValue"),
      expense: document.querySelector("#expenseValue"),
      net: document.querySelector("#netValue"),
      teamRows: document.querySelector("#teamRows"),
      shareRows: document.querySelector("#shareRows"),
      report: document.querySelector("#reportText"),
      copy: document.querySelector("#copyBtn"),
      copyState: document.querySelector("#copyState"),
      download: document.querySelector("#downloadBtn"),
      downloadLink: document.querySelector("#downloadLink"),
      print: document.querySelector("#printBtn"),
      sample: document.querySelector("#sampleBtn"),
      expenseRate: document.querySelector("#expenseRateText")
    };

    function parseAmount(value) {
      const cleaned = String(value).replace(/[,\s]/g, "");
      const parsed = Number(cleaned);
      return Number.isFinite(parsed) && parsed > 0 ? parsed : 0;
    }

    function formatAmount(value) {
      return CONFIG.rounding(value).toLocaleString("en-US");
    }

    function formatRate(rate) {
      return `${(rate * 100).toLocaleString("en-US", { maximumFractionDigits: 4 })}%`;
    }

    function formatDateInput(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatMonthInput(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      return `${year}-${month}`;
    }

    function applyCurrentDateDefaults() {
      const today = new Date();
      const defaultSettlementMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);

      els.date.value = formatDateInput(today);
      els.settlementMonth.value = formatMonthInput(defaultSettlementMonth);
    }

    function parseLocalDate(value) {
      if (!value) {
        return null;
      }
      const raw = value;
      const [year, month, day] = raw.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatDateCN(date) {
      if (!date) {
        return "";
      }
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}年${month}月${day}日`;
    }

    function getSettlementMonth(date) {
      if (!date) {
        return null;
      }
      return new Date(date.getFullYear(), date.getMonth() - 1, 1);
    }

    function parseMonthInput(value, fallbackDate) {
      if (value && /^\d{4}-\d{2}$/.test(value)) {
        const [year, month] = value.split("-").map(Number);
        return new Date(year, month - 1, 1);
      }
      return fallbackDate ? getSettlementMonth(fallbackDate) : null;
    }

    function formatMonthCN(date) {
      if (!date) {
        return "";
      }
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      return `${year}年${month}月`;
    }

    function compute() {
      const gross = parseAmount(els.gross.value);
      const date = parseLocalDate(els.date.value);
      const month = parseMonthInput(els.settlementMonth.value, date);
      const hasGross = gross > 0;
      const teamTotalRate = CONFIG.teams.reduce((sum, item) => sum + item.rate, 0);
      const totalExpense = CONFIG.rounding(gross * teamTotalRate);
      const net = CONFIG.rounding(gross - totalExpense);
      const teams = CONFIG.teams.map(item => ({
        ...item,
        amount: CONFIG.rounding(gross * item.rate)
      }));
      const shareholders = CONFIG.shareholders.map(item => ({
        ...item,
        count: item.count || 1,
        singleAmount: CONFIG.rounding(net * item.rate)
      })).map(item => ({
        ...item,
        displayName: item.count > 1 ? `${item.name}（${item.count}人）` : item.name,
        rateText: item.count > 1 ? `${formatRate(item.rate)} × ${item.count}` : formatRate(item.rate),
        amount: item.singleAmount * item.count
      }));

      return {
        gross,
        hasGross,
        date,
        month,
        teamTotalRate,
        totalExpense,
        net,
        teams,
        shareholders
      };
    }

    function renderRows(target, rows, finalRow) {
      const body = rows.map(row => `
        <tr>
          <td>${row.displayName || row.name}</td>
          <td>${row.rateText || formatRate(row.rate)}</td>
          <td>${formatAmount(row.amount)}</td>
        </tr>
      `).join("");

      target.innerHTML = `${body}
        <tr class="total-row">
          <td>${finalRow.label}</td>
          <td>${finalRow.rate}</td>
          <td>${formatAmount(finalRow.amount)}</td>
        </tr>
      `;
    }

    function buildReport(data) {
      if (!data.hasGross) {
        return "";
      }
      const teamLines = data.teams
        .map(row => `${row.name}：${formatAmount(data.gross)} × ${formatRate(row.rate)} = ${formatAmount(row.amount)}`)
        .join("\n");
      const teamFormula = `${formatAmount(data.gross)} × ${formatRate(data.teamTotalRate)} = ${formatAmount(data.totalExpense)}`;
      const shareholderLines = data.shareholders
        .map(row => {
          if (row.count > 1) {
            return `${row.displayName}：${formatAmount(data.net)} × ${formatRate(row.rate)} × ${row.count} = ${formatAmount(row.amount)}（每人 ${formatAmount(row.singleAmount)}）`;
          }

          return `${row.name}：${formatAmount(data.net)} × ${formatRate(row.rate)} = ${formatAmount(row.amount)}`;
        })
        .join("\n\n");

      return `${formatMonthCN(data.month)}结算总额：${formatAmount(data.gross)}（单位：${CONFIG.unit}）
结算时间：${formatDateCN(data.date)}

计算明细：
${teamLines}
合计支出：${teamFormula}

净额：${formatAmount(data.gross)} - ${formatAmount(data.totalExpense)} = ${formatAmount(data.net)}

股东：
${shareholderLines}`;
    }

    function render() {
      const data = compute();
      const monthText = formatMonthCN(data.month);
      const dateText = formatDateCN(data.date);
      const periodParts = [];

      if (monthText) {
        periodParts.push(`${monthText}结算`);
      }

      if (dateText) {
        periodParts.push(`结算时间 ${dateText}`);
      }

      els.period.textContent = periodParts.join(" · ");
      els.month.textContent = monthText;
      els.expense.textContent = data.hasGross ? `${formatAmount(data.totalExpense)} ${CONFIG.unit}` : "";
      els.net.textContent = data.hasGross ? `${formatAmount(data.net)} ${CONFIG.unit}` : "";
      els.expenseRate.textContent = formatRate(data.teamTotalRate);

      if (data.hasGross) {
        renderRows(els.teamRows, data.teams, {
          label: "合计支出",
          rate: formatRate(data.teamTotalRate),
          amount: data.totalExpense
        });

        renderRows(els.shareRows, data.shareholders, {
          label: "已分配合计",
          rate: "",
          amount: data.shareholders.reduce((sum, item) => sum + item.amount, 0)
        });
      } else {
        els.teamRows.innerHTML = "";
        els.shareRows.innerHTML = "";
      }

      els.report.value = buildReport(data);
      els.copyState.textContent = "";
      return data;
    }

    function csvEscape(value) {
      return `"${String(value).replace(/"/g, '""')}"`;
    }

    function downloadCsv() {
      const data = compute();
      if (!data.hasGross) {
        return;
      }
      const rows = [
        ["类型", "名称", "基数", "比例", "金额"],
        ["结算", formatMonthCN(data.month), data.gross, "", data.gross],
        ...data.teams.map(row => ["团队支出", row.name, data.gross, formatRate(row.rate), row.amount]),
        ["团队支出", "合计支出", data.gross, formatRate(data.teamTotalRate), data.totalExpense],
        ["净额", "净额", data.gross, "", data.net],
        ...data.shareholders.map(row => ["股东分配", row.displayName || row.name, data.net, row.rateText || formatRate(row.rate), row.amount])
      ];

      const csv = `\ufeff${rows.map(row => row.map(csvEscape).join(",")).join("\n")}`;
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      els.downloadLink.href = url;
      els.downloadLink.download = `settlement-${els.date.value || "report"}.csv`;
      els.downloadLink.click();
      URL.revokeObjectURL(url);
    }

    async function copyReport() {
      try {
        await navigator.clipboard.writeText(els.report.value);
        els.copyState.textContent = "已复制";
      } catch (error) {
        els.report.select();
        document.execCommand("copy");
        els.copyState.textContent = "已复制";
      }
      window.setTimeout(() => {
        els.copyState.textContent = "";
      }, 1600);
    }

    els.settlementMonth.addEventListener("input", render);
    els.date.addEventListener("input", render);
    els.gross.addEventListener("input", render);
    els.gross.addEventListener("blur", () => {
      const amount = parseAmount(els.gross.value);
      els.gross.value = amount ? formatAmount(amount) : "";
      render();
    });
    els.copy.addEventListener("click", copyReport);
    els.download.addEventListener("click", downloadCsv);
    els.print.addEventListener("click", () => window.print());
    els.sample.addEventListener("click", () => {
      applyCurrentDateDefaults();
      els.gross.value = "";
      render();
    });

    applyCurrentDateDefaults();
    render();
  </script>
</body>
</html>
